<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B000E"/>
      <stop offset="0.45" stop-color="#17001E"/>
      <stop offset="1" stop-color="#2F003C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="65%">
      <stop offset="0" stop-color="#EB0D41" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#EB0D41" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <circle cx="240" cy="160" r="360" fill="#EB0D41" opacity="0.55" filter="url(#blur)"/>
  <circle cx="1680" cy="920" r="420" fill="#80003B" opacity="0.45" filter="url(#blur)"/>
  <circle cx="1650" cy="120" r="420" fill="#2F003C" opacity="0.55" filter="url(#blur)"/>

  <g fill="none" stroke="rgba(255,255,255,0.12)">
    <rect x="1040" y="250" width="760" height="430" rx="28" />
  </g>
  <g fill="rgba(255,255,255,0.08)">
    <rect x="1080" y="290" width="44" height="44" rx="14"/>
    <rect x="1140" y="300" width="220" height="10" rx="999"/>
    <rect x="1140" y="318" width="160" height="8" rx="999" opacity="0.8"/>
    <rect x="1660" y="296" width="110" height="34" rx="999" fill="rgba(235,13,65,0.18)" stroke="rgba(235,13,65,0.30)"/>
  </g>

  <g>
    <text x="160" y="420" fill="white" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="96" font-weight="800" letter-spacing="-2">RYTHMONS</text>
    <text x="160" y="468" fill="#EB0D41" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" font-weight="700" letter-spacing="6">PAR LES INDÉS, POUR LES INDÉS</text>
    <text x="160" y="538" fill="rgba(255,255,255,0.70)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26">
      Booking, calendrier, confirmations.
    </text>
  </g>
</svg>

